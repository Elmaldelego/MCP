version: "3.8"

services:
  vigia-mcp:
    image: emiliano280/vigia-mcp:latest
    container_name: vigia-mcp
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - OUTPUT_DIR=/outputs
      - LOG_LEVEL=INFO
    volumes:
      - vigia_outputs:/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/sse', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  vigia_outputs:
